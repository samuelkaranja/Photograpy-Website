{% extends 'Gallery/base.html' %}

{% load static %}

{% block content %}
    <div class="">
        <div class="slider">
            <div id="carouselExampleFade" class="carousel slide carousel-fade" data-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="{% static 'Gallery/Image/1.jpg' %}" class="d-block img-fluid" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'Gallery/Image/2.jpg' %}" class="d-block img-fluid" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'Gallery/Image/3.jpg' %}" class="d-block img-fluid" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'Gallery/Image/4.jpg' %}" class="d-block img-fluid" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'Gallery/Image/5.jpg' %}" class="d-block img-fluid" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'Gallery/Image/500.jpg' %}" class="d-block img-fluid" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'Gallery/Image/6.jpg' %}" class="d-block img-fluid" alt="...">
                    </div>
                    <div class="carousel-item">

                    <div class="carousel-item">
                        <img src="{% static 'Gallery/Image/9.jpg' %}" class="d-block img-fluid" alt="...">
                    </div>
                </div>
                <a class="carousel-control-prev" href="#carouselExampleFade" role="button" data-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="sr-only">Previous</span>
                </a>
                <a class="carousel-control-next" href="#carouselExampleFade" role="button" data-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="sr-only">Next</span>
                </a>
            </div>
        </div>
    </div>
{% endblock %}
