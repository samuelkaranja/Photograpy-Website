{% extends 'Gallery/base.html' %}

{% load static %}

{% load widget_tweaks %}

{% block content %}
    <div class="content-container">
        <div class="contact">
            <div class="contact-header">
                <h2>Contact</h2>
            </div>

            <div class="col-md-4 contact-banner">
                <hr class="hr">
                <img class="c_img" src="{% static 'Gallery/Image/contact-banner.jpg' %}">
            </div>

            <div class="col-md-5">
                <form method="POST">
                    <div class="form-group">
                        <label for="exampleInputEmail1">Name*</label>
                        <input type="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="exampleInputEmail1">Email*</label>
                        <input type="email" class="form-control" placeholder="Someone@gmail.com" required>
                        <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
                    </div>
                    <div class="form-group">
                        <label for="exampleInputEmail1">Phone*</label>
                        <input type="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="exampleFormControlTextarea1">Comments*</label>
                        <textarea class="form-control" rows="5" placeholder="Write message" required></textarea >
                    </div>
                    <button type="submit" class="btn btn-success">Send Message</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
